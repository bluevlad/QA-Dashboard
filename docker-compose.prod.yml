services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: qa-dashboard-api:latest
    container_name: qa-dashboard-api
    restart: always
    ports:
      - "9095:8000"
    env_file:
      - .env
    environment:
      - QA_DASHBOARD_LOG_DIR=/app/logs
    volumes:
      - /Users/rainend/DockerData/qa-dashboard/logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - qa-dashboard-network
      - database-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: qa-dashboard-web:latest
    container_name: qa-dashboard-web
    restart: always
    ports:
      - "4095:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - qa-dashboard-network

networks:
  qa-dashboard-network:
    driver: bridge
  database-network:
    external: true
